<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>Login and Logout Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            width: 300px;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .form-group button:hover {
            background-color: #218838;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container" id="login-container">
        <h2>Login</h2>
        <div id="error-message" class="error-message hidden" role="alert" aria-live="polite"></div>
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required aria-required="true" maxlength="64" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required aria-required="true" maxlength="128" autocomplete="current-password">
        </div>
        <div class="form-group">
            <button id="login-btn">Login</button>
        </div>
        <div class="form-group hidden" id="logout-container">
            <button id="logout-btn">Logout</button>
        </div>
    </div>

    <script src="gtpjavascript logand out.js"></script>
</body>
</html>
