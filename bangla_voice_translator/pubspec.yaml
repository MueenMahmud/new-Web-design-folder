name: bangla_voice_translator
description: Real-time AI-powered voice translation app that converts Bangla speech into Korean and English voice.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.8

  # Audio
  record: ^5.0.4
  just_audio: ^0.9.36
  path_provider: ^2.1.1
  permission_handler: ^11.1.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^2.7.0
  cached_network_image: ^3.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  share_plus: ^7.2.1
  flutter_tts: ^3.8.5
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Routing
  go_router: ^12.1.3

dependency_overrides:
  record_platform_interface: '1.5.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  injectable_generator: ^2.4.1
  mockito: ^5.4.3
  bloc_test: ^9.1.5
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
